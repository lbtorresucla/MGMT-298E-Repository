<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Review Sentiment Evaluator</title>
  <style>
    body { font-family: monospace; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    label { display: block; margin-top: 14px; }
    input[type="password"] { width: 420px; padding: 4px; }
    button { margin-top: 16px; padding: 8px 18px; cursor: pointer; font-size: 14px; }
    button:disabled { cursor: not-allowed; opacity: 0.5; }
    #log { margin-top: 20px; white-space: pre; font-size: 13px; line-height: 1.6; }
    #summary { margin-top: 16px; padding: 12px; background: #f4f4f4; border-left: 4px solid #333; display: none; }
  </style>
</head>
<body>

<h2>Review Sentiment Evaluator</h2>

<label>OPENAI_API_KEY:<br>
  <input type="password" id="apiKey" placeholder="sk-..." />
</label>

<label>reviews_hand_labeled.csv:<br>
  <input type="file" id="csvFile" accept=".csv,.tsv,.txt" />
</label>

<button id="runBtn" onclick="run()">Run Evaluation</button>

<div id="log"></div>
<div id="summary"></div>

<script>
  function log(msg) {
    document.getElementById('log').textContent += msg + '\n';
  }

  function parseCSV(text) {
    const lines = text.replace(/^﻿/, '').replace(/\r/g, '').trim().split('\n').filter(l => l.trim());
    const headers = lines[0].split('\t').map(h => h.trim());
    return lines.slice(1).map(line => {
      const cols = line.split('\t');
      const row = {};
      headers.forEach((h, i) => { row[h] = (cols[i] ?? '').trim(); });
      return row;
    });
  }

  function toCSV(rows) {
    const headers = ['review_number', 'review_id', 'review_title', 'review_text', 'hand_label', 'llm_score', 'match'];
    const lines = [headers.join('\t')];
    rows.forEach(r => lines.push(headers.map(h => r[h] ?? '').join('\t')));
    return lines.join('\n');
  }

  function download(filename, content) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([content], { type: 'text/csv' }));
    a.download = filename;
    a.click();
  }

  async function classify(apiKey, title, text) {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        messages: [{ role: 'user', content:
          `You are a sentiment classifier. Rate this product review on a 1–5 scale.\n` +
          `1 = very negative, 2 = negative, 3 = neutral, 4 = positive, 5 = very positive.\n` +
          `Reply with ONLY a single digit. No explanation.\n\nTitle: ${title}\nReview: ${text}`
        }],
        max_tokens: 2,
        temperature: 0
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }
    return (await res.json()).choices[0].message.content.trim();
  }

  async function run() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const file = document.getElementById('csvFile').files[0];
    if (!apiKey) { alert('Please enter your OpenAI API key.'); return; }
    if (!file)   { alert('Please select reviews_hand_labeled.csv.'); return; }

    document.getElementById('log').textContent = '';
    document.getElementById('summary').style.display = 'none';
    document.getElementById('runBtn').disabled = true;

    try {
      const text = await file.text();
      const rows = parseCSV(text);
      log(`Loaded ${rows.length} reviews. Sending to gpt-4o-mini...\n`);

      let matches = 0;
      const results = [];

      for (const row of rows) {
        const llm_score = await classify(apiKey, row.review_title, row.review_text);
        const match = llm_score === row.hand_label ? 'TRUE' : 'FALSE';
        if (match === 'TRUE') matches++;
        results.push({ ...row, llm_score, match });
        log(`#${String(row.review_number).padStart(2, ' ')}  hand_label=${row.hand_label}  llm_score=${llm_score}  ${match}`);
      }

      download('reviews_evaluated.csv', toCSV(results));

      const total = rows.length;
      const mismatches = total - matches;
      const accuracy = ((matches / total) * 100).toFixed(1);

      const el = document.getElementById('summary');
      el.style.display = 'block';
      el.innerHTML =
        `<strong>Summary</strong><br><br>` +
        `Total reviews: ${total}<br>` +
        `Matches: ${matches}<br>` +
        `Mismatches: ${mismatches}<br>` +
        `Accuracy: ${accuracy}%<br><br>` +
        `<em>reviews_evaluated.csv downloaded.</em>`;

    } catch (err) {
      log('ERROR: ' + err.message);
    } finally {
      document.getElementById('runBtn').disabled = false;
    }
  }
</script>

</body>
</html>
