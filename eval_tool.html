<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Review Sentiment Evaluator</title>
  <style>
    body { font-family: monospace; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    input[type="password"] { width: 420px; padding: 4px; }
    button { margin-top: 10px; padding: 8px 18px; cursor: pointer; font-size: 14px; }
    button:disabled { cursor: not-allowed; opacity: 0.5; }
    #log { margin-top: 20px; white-space: pre; font-size: 13px; line-height: 1.6; }
    #summary { margin-top: 16px; padding: 12px; background: #f4f4f4; border-left: 4px solid #333; display: none; }
    label { display: block; margin-top: 14px; }
  </style>
</head>
<body>

<h2>Review Sentiment Evaluator</h2>

<label>
  OPENAI_API_KEY:<br>
  <input type="password" id="apiKey" placeholder="Paste your OpenAI API key (sk-...)" />
</label>

<label>
  reviews_hand_labeled.csv:<br>
  <input type="file" id="csvFile" accept=".csv,.tsv,.txt" />
</label>

<br>
<button id="runBtn" onclick="run()">Run Evaluation</button>

<div id="log"></div>
<div id="summary"></div>

<script>
  const MODEL   = 'gpt-4o-mini';
  const CSV_OUT = 'reviews_evaluated.csv';

  const PROMPT = (title, text) =>
    `You are a sentiment classifier. Rate the following product review on a scale from 1 to 5.\n` +
    `1 = very negative, 2 = negative, 3 = neutral, 4 = positive, 5 = very positive.\n` +
    `Reply with ONLY a single digit. No explanation, no punctuation.\n\n` +
    `Title: ${title}\nReview: ${text}`;

  function log(msg) {
    document.getElementById('log').textContent += msg + '\n';
  }

  function parseTSV(text) {
    const cleaned = text.replace(/^﻿/, '').replace(/\r/g, '');
    const lines = cleaned.trim().split('\n').filter(l => l.trim());
    const headers = lines[0].split('\t').map(h => h.trim());
    return lines.slice(1).map(line => {
      const cols = line.split('\t');
      const row = {};
      headers.forEach((h, i) => { row[h] = (cols[i] ?? '').trim(); });
      return row;
    });
  }

  function toTSV(rows, headers) {
    return [headers.join('\t'), ...rows.map(r => headers.map(h => r[h] ?? '').join('\t'))].join('\n');
  }

  function triggerDownload(filename, content) {
    const blob = new Blob([content], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  }

  function readFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = e => resolve(e.target.result);
      reader.onerror = () => reject(new Error('Failed to read file.'));
      reader.readAsText(file);
    });
  }

  async function classify(apiKey, title, text) {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type':  'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [{ role: 'user', content: PROMPT(title, text) }],
        max_tokens: 2,
        temperature: 0
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    return (await res.json()).choices[0].message.content.trim();
  }

  async function run() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const file   = document.getElementById('csvFile').files[0];

    if (!apiKey) { alert('Please paste your OpenAI API key.'); return; }
    if (!file)   { alert('Please select the reviews_hand_labeled.csv file.'); return; }

    document.getElementById('log').textContent      = '';
    document.getElementById('summary').style.display = 'none';
    document.getElementById('runBtn').disabled      = true;

    try {
      log('Reading ' + file.name + ' ...');
      const rawText = await readFile(file);
      log('First 200 chars: ' + JSON.stringify(rawText.slice(0, 200)));
      const rows = parseTSV(rawText);
      log('Headers found: ' + JSON.stringify(Object.keys(rows[0] ?? {})));
      log(`Loaded ${rows.length} reviews. Calling ${MODEL}...\n`);

      let matches = 0;
      const results = [];

      for (const row of rows) {
        const llm_score = await classify(apiKey, row.review_title, row.review_text);
        const match     = llm_score === row.hand_label ? 'TRUE' : 'FALSE';
        if (match === 'TRUE') matches++;
        results.push({ ...row, llm_score, match });
        log(`#${(row.review_number ?? '?').padStart(2, ' ')}  hand_label=${row.hand_label}  llm=${llm_score}  ${match}`);
      }

      const headers = ['review_number','review_id','review_title','review_text','hand_label','llm_score','match'];
      triggerDownload(CSV_OUT, toTSV(results, headers));

      const total      = rows.length;
      const mismatches = total - matches;
      const accuracy   = ((matches / total) * 100).toFixed(1);

      const summaryEl = document.getElementById('summary');
      summaryEl.style.display = 'block';
      summaryEl.innerHTML =
        `<strong>Summary</strong><br><br>` +
        `Total reviews:  ${total}<br>` +
        `Matches:        ${matches}<br>` +
        `Mismatches:     ${mismatches}<br>` +
        `Accuracy:       ${accuracy}%<br><br>` +
        `<em>${CSV_OUT} downloaded to your Downloads folder.</em>`;

    } catch (err) {
      log('\nERROR: ' + err.message);
    } finally {
      document.getElementById('runBtn').disabled = false;
    }
  }
</script>

</body>
</html>
